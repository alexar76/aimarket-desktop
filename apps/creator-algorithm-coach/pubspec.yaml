name: creator_algorithm_coach
description: "Flutter desktop app for TikTok/YouTube/IG/X algorithm optimization. Buys weekly-updated algorithm signals by platform, trend windows, optimal posting times by niche."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  aicom_desktop_core:
    path: ../packages/aicom_desktop_core
  aicom_platform_init:
    path: ../packages/aicom_platform_init
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  intl: ^0.20.2
  http: ^1.2.2
  url_launcher: ^6.3.1
  flutter_svg: ^2.0.17
  provider: ^6.1.2
  shared_preferences: ^2.3.4
  desktop_drop: ^0.5.0
  aimarket_agent:
    path: ../../aimarket-sdks/dart

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/screenshots/
