name: freelance_contract_reviewer
description: "Desktop contract reviewer for freelancers. Local parsing, marketplace clause libraries via AI Market Protocol v2, TEE-verified evaluation."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  aicom_desktop_core:
    path: ../packages/aicom_desktop_core
  aicom_platform_init:
    path: ../packages/aicom_platform_init
  provider: ^6.1.2
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  path: ^1.9.1
  path_provider: ^2.1.5
  file_picker: ^8.1.7
  http: ^1.2.2
  intl: ^0.20.2
  url_launcher: ^6.3.1
  flutter_secure_storage: ^9.2.4
  sqflite: ^2.4.2
  aimarket_agent:
    path: ../../aimarket-sdks/dart

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
