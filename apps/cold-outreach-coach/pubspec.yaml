name: cold_outreach_coach
description: "Flutter desktop app for B2B cold email/DM optimization. Uses AI Market Protocol v2 for decentralized deliverability rules and reply-rate signals."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  aicom_desktop_core:
    path: ../packages/aicom_desktop_core
  aicom_platform_init:
    path: ../packages/aicom_platform_init
  provider: ^6.1.2
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  path: ^1.9.1
  path_provider: ^2.1.5
  file_picker: ^8.1.7
  intl: ^0.20.2
  http: ^1.2.2
  url_launcher: ^6.3.1
  desktop_drop: ^0.5.0
  sqflite: ^2.4.2
  yaml: ^3.1.1
  aimarket_agent:
    path: ../../aimarket-sdks/dart

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
