name: capability_composer
description: "Desktop pipeline builder for the AI Market Protocol — Zapier for aimarket. Visually discover, chain, execute, and sell AI capabilities."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  aicom_desktop_core:
    path: ../packages/aicom_desktop_core
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  path: ^1.9.1
  path_provider: ^2.1.5
  intl: ^0.20.2
  http: ^1.2.2
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  provider: ^6.1.2
  json_annotation: ^4.9.0
  aimarket_agent:
    path: ../../aimarket-sdks/dart

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
